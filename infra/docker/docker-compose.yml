# Local development only. Deployed Postgres/Redis are managed services
# (Railway Postgres/Neon, Railway Redis — ARCHITECTURE.md §1), not this
# compose file; it exists purely to give `apps/api` something to point
# DATABASE_URL / REDIS_URL at without any cloud account being a
# prerequisite for local development.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: blueprint
      POSTGRES_PASSWORD: blueprint
      POSTGRES_DB: blueprint
    ports:
      - "5432:5432"
    volumes:
      - blueprint_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  blueprint_postgres_data:
